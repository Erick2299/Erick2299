<svg width="100%" height="90" viewBox="0 0 1200 90" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Developer banner</title>
  <desc>Minimalist banner showing name and role as a software developer</desc>

  <rect width="1200" height="90" fill="#0d1117"/>

  <!-- Subtle vertical accent line -->
  <rect x="48" y="20" width="2" height="50" fill="#58a6ff" opacity="0.7"/>

  <!-- Name -->
  <text x="64" y="45" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="1">Erick Pérez</text>

  <!-- Role -->
  <text x="64" y="67" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff" letter-spacing="2">DESARROLLADOR JUNIOR</text>

  <!-- Decorative dots top-right -->
  <circle cx="1140" cy="28" r="3" fill="#58a6ff" opacity="0.3"/>
  <circle cx="1155" cy="28" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="1170" cy="28" r="3" fill="#58a6ff" opacity="0.8"/>

  <!-- Bottom thin line -->
  <rect x="48" y="80" width="400" height="1" fill="#58a6ff" opacity="0.2"/>
</svg>
